<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VigieSante - Collecte IMC</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>
    <div class="container">
        <div class="header-image">
            <img src="{{url_for('static',filename='accueil.jpeg')}}"
            alt="Sante" class="form-image">
            </div>
        <h1>Collecte de données Biométriques</h1>
        <p>Veuillez remplir vos informations pour une analyse instantanée.</p>
        <form action="/calculer" method="POST">
            <div class="input-group">
                <label>Votre Nom :</label><br>
                <input type="text" name="utilisateur" required>
                <label>Téléphone :</label>
                <input type="tel" name="telephone" placeholder="Ex: 6xxxxxxxx" required>
                <label>Poids (en kg) :</label><br>
                <input type="number" name="poids" step="0.1" placeholder="Ex:75.5" required>
                <label>Taille (en mètres) :</label><br>
                <input type="number" name="taille" step="0.01" placeholder="Ex: 1.75" required>
             </div>
            <button type="submit">Envoyer et Analyser</button>
        </form>
    </div>

<footer style="margin-top: 30px; text-align: center; padding: 15px; border-top: 1px solid #eee; background: #f9f9f9; width: 100%; box-sizing: border-box;">
    <p style="margin: 5px 0; font-size: 0.9em; font-weight: bold; color: #2c3e50;">Application de Recensement Santé © 2026</p>
    <p style="margin: 5px 0; font-size: 0.9em; color: #34495e;">Développée par <span style="color: #3498db;">Alexie Rostelle Bande Fetgna</span></p>
    <p style="margin: 5px 0; font-size: 0.75em; color: #7f8c8d; font-style: italic;">Étudiante en Informatique - Niveau 2 - UY1</p>
</footer>

    
</body>
</html>
